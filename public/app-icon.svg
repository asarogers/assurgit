<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#07070f"/>
    </linearGradient>
    <linearGradient id="A" x1="512" y1="310" x2="512" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="210" fill="url(#bg)"/>

  <!-- Subtle inner glow at top -->
  <ellipse cx="512" cy="200" rx="300" ry="120" fill="#6366f1" opacity="0.08"/>

  <!-- Signal arcs radiating upward from apex (512, 310) -->
  <!-- Arc 3 — largest, faintest -->
  <path d="M 356,218 A 180,180 0 0,1 668,218"
    fill="none" stroke="#4f46e5" stroke-width="18" stroke-linecap="round" opacity="0.30"/>
  <!-- Arc 2 — medium -->
  <path d="M 408,248 A 120,120 0 0,1 616,248"
    fill="none" stroke="#818cf8" stroke-width="24" stroke-linecap="round" opacity="0.60"/>
  <!-- Arc 1 — smallest, brightest -->
  <path d="M 456,278 A 65,65 0 0,1 568,278"
    fill="none" stroke="#c7d2fe" stroke-width="30" stroke-linecap="round" opacity="0.95"/>

  <!-- Apex dot -->
  <circle cx="512" cy="310" r="18" fill="#e0e7ff" opacity="0.95"/>

  <!-- Letter A — left leg (triangle) -->
  <polygon points="512,310 228,820 350,820" fill="url(#A)"/>
  <!-- Letter A — right leg (triangle) -->
  <polygon points="512,310 796,820 674,820" fill="url(#A)"/>
  <!-- Letter A — crossbar (trapezoid matching inner leg angles) -->
  <!-- Inner left edge at y=610: lerp (512,310)→(350,820), t=(610-310)/510=0.588; x=512-0.588*162=607-95=417 -->
  <!-- Inner right edge at y=610: x=512+95=607 -->
  <!-- Inner left at y=678: t=(678-310)/510=0.722; x=512-0.722*162=395; right=629 -->
  <polygon points="417,610 607,610 629,678 395,678" fill="url(#A)"/>
</svg>
